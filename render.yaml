services:
  # Backend service
  - type: web
    name: spaceverse-rocketml-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend static site
  - type: web
    name: spaceverse-rocketml-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://spaceverse-rocketml-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
